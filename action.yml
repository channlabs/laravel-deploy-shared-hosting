name: "Laravel Shared Hosting Deploy"

description: "Deploy Laravel apps to shared hosting via FTP. Automates asset building, ZIP packaging, migrations & health checks."

author: Chann Labs Creative Studio

branding:
  icon: upload-cloud
  color: purple

inputs:

  ftp-server:
    description: FTP server hostname or IP.
    required: true

  ftp-username:
    description: FTP username.
    required: true

  ftp-password:
    description: FTP password.
    required: true

  ftp-directory:
    description: Remote deployment directory.
    required: false
    default: "/"

  deploy-url:
    description: Public deployment URL.
    required: true

  deploy-token:
    description: Secure deployment token.
    required: true

  php-version:
    description: PHP version.
    default: "8.4"

  node-version:
    description: Node.js version.
    default: "24"

  pnpm-version:
    description: PNPM version.
    default: "10"

  run-migrations:
    description: Execute database migrations.
    default: "true"

  optimize:
    description: Optimize Laravel.
    default: "true"

  maintenance:
    description: Enable maintenance mode.
    default: "true"

  health-check:
    description: Perform health check.
    default: "true"

outputs:

  deployment-url:
    description: Final deployment URL.
    value: ${{ inputs.deploy-url }}

runs:

  using: composite

  steps:

    ##############################################
    ## Setup PHP
    ##############################################

    - name: 🐘 Configure PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: >
          mbstring,
          xml,
          ctype,
          iconv,
          intl,
          pdo_mysql,
          zip,
          fileinfo
        coverage: none

    ##############################################
    ## Composer
    ##############################################

    - name: 📦 Install Composer Dependencies
      shell: bash
      run: |

        composer validate --no-check-publish

        composer install \
          --prefer-dist \
          --no-dev \
          --optimize-autoloader \
          --classmap-authoritative \
          --no-interaction \
          --no-progress

    ##############################################
    ## Environment
    ##############################################

    - name: 🔑 Prepare Environment
      shell: bash
      run: |

        if [ ! -f ".env" ]; then
          cp .env.example .env
        fi

    ##############################################
    ## PNPM
    ##############################################

    - name: ⚡ Setup PNPM
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    ##############################################
    ## Node
    ##############################################

    - name: ⚙️ Configure Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    ##############################################
    ## Build
    ##############################################

    - name: 🏗 Build Production Assets
      shell: bash
      run: |

        pnpm install --frozen-lockfile

        pnpm build

        rm -f public/hot

        pnpm store prune

    ##############################################
    ## Package
    ##############################################

    - name: 📦 Package Application
      shell: bash
      env:
        DEPLOY_TOKEN: ${{ inputs.deploy-token }}
        RUN_MIGRATIONS: ${{ inputs.run-migrations }}
        OPTIMIZE: ${{ inputs.optimize }}
        MAINTENANCE: ${{ inputs.maintenance }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: |

        chmod +x ${{ github.action_path }}/scripts/package.sh

        ${{ github.action_path }}/scripts/package.sh

    ##############################################
    ## Install LFTP
    ##############################################

    - name: 📥 Install LFTP
      shell: bash
      run: |

        sudo apt-get update

        sudo apt-get install -y lftp

    ##############################################
    ## Upload
    ##############################################

    - name: 📤 Upload Deployment
      shell: bash
      env:
        FTP_SERVER: ${{ inputs.ftp-server }}
        FTP_USERNAME: ${{ inputs.ftp-username }}
        FTP_PASSWORD: ${{ inputs.ftp-password }}
        FTP_DIRECTORY: ${{ inputs.ftp-directory }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: |

        chmod +x ${{ github.action_path }}/scripts/upload.sh

        ${{ github.action_path }}/scripts/upload.sh

    ##############################################
    ## Execute
    ##############################################

    - name: 🚀 Execute Deployment
      shell: bash
      run: |

        echo "Executing remote deployment..."
        CLEAN_URL="${{ inputs.deploy-url }}"
        CLEAN_URL=$(echo "$CLEAN_URL" | sed -e 's|^https://||' -e 's|^http://||' -e 's|/*$||')
        USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
        
        RESPONSE=$(curl -sS -L -A "$USER_AGENT" --retry 3 --retry-delay 3 -w "\nHTTP_STATUS:%{http_code}" "https://${CLEAN_URL}/deploy.php?token=${{ inputs.deploy-token }}" || true)
        STATUS_CODE=$(echo "$RESPONSE" | tr '\n' ' ' | sed -e 's/.*HTTP_STATUS://' | tr -d ' ')
        
        if [ "$STATUS_CODE" -ne 200 ]; then
          RESPONSE=$(curl -sS -L -A "$USER_AGENT" --retry 3 --retry-delay 3 -w "\nHTTP_STATUS:%{http_code}" "https://${CLEAN_URL}/unzip.php" || true)
          STATUS_CODE=$(echo "$RESPONSE" | tr '\n' ' ' | sed -e 's/.*HTTP_STATUS://' | tr -d ' ')
        fi

        echo "$RESPONSE" | grep -v "HTTP_STATUS:"
        
        if [ "$STATUS_CODE" -ne 200 ]; then
          echo "::error::Deployment execution failed with HTTP status code $STATUS_CODE"
          exit 1
        fi

    ##############################################
    ## Health
    ##############################################

    - name: ❤️ Verify Deployment
      if: inputs.health-check == 'true'
      shell: bash
      run: |

        chmod +x ${{ github.action_path }}/scripts/verify.sh

        ${{ github.action_path }}/scripts/verify.sh \
          "https://${{ inputs.deploy-url }}"

    ##############################################
    ## Cleanup
    ##############################################

    - name: 🧹 Cleanup Local Temporary Files
      if: always()
      shell: bash
      run: |

        echo "Cleaning up local temporary files..."
        rm -f deploy.php
        rm -f deploy-*.zip
        rm -f vendor-*.zip
        rm -f deploy-manifest.json
        rm -f deploy.sha256
        echo "Cleanup completed."