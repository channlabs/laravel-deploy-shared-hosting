name: Deploy Laravel Inertia React

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - production
      run_migrations:
        description: "Database Migration"
        required: false
        type: boolean
        default: false
      maintenance:
        description: "Maintenance Mode"
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    name: 🚀 Deploy Inertia React App
    runs-on: ubuntu-latest
    env:
      IS_PROD: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') || (github.event_name != 'workflow_dispatch' && github.ref_name == 'main') }}

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      # Menggunakan pnpm/action-setup jika menggunakan pnpm
      - name: ⚡ Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🚀 Laravel Shared Hosting Deploy
        uses: channlabs/laravel-deploy-shared-hosting@v1
        with:
          ftp-server: ${{ env.IS_PROD == 'true' && secrets.FTP_SERVER || secrets.FTP_SERVER_STAGING }}
          ftp-username: ${{ env.IS_PROD == 'true' && secrets.FTP_USERNAME || secrets.FTP_USERNAME_STAGING }}
          ftp-password: ${{ env.IS_PROD == 'true' && secrets.FTP_PASSWORD || secrets.FTP_PASSWORD_STAGING }}
          ftp-directory: ${{ env.IS_PROD == 'true' && '/subdomain.domain.com' || '/staging_html' }}
          deploy-url: ${{ env.IS_PROD == 'true' && 'subdomain.domain.com' || 'staging.subdomain.domain.com' }}
          deploy-token: ${{ secrets.DEPLOY_TOKEN }}
          php-version: "8.3"
          node-version: "22"
          pnpm-version: "10"
          run-migrations: ${{ github.event_name == 'workflow_dispatch' && inputs.run_migrations || 'true' }}
          optimize: "true"
          maintenance: ${{ github.event_name == 'workflow_dispatch' && inputs.maintenance || 'true' }}
          health-check: "true"
